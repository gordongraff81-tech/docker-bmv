; BMV Menüdienst – PHP-Konfiguration

; Fehler: Im Dev-Modus anzeigen, im Prod auskommentieren
display_errors  = On
error_reporting = E_ALL
log_errors      = On

; Zeitzone
date.timezone = Europe/Berlin

; E-Mail über msmtp → Mailhog
sendmail_path = /usr/bin/msmtp -t

; Upload
upload_max_filesize = 16M
post_max_size       = 16M
max_execution_time  = 60

; Zeichenkodierung
default_charset = UTF-8

; Opcache (Entwicklung: revalidate)
opcache.enable            = 1
opcache.revalidate_freq   = 0
opcache.validate_timestamps = 1
