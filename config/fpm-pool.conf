[www]
user  = www-data
group = www-data

listen = 0.0.0.0:9000

; Prozesse
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5

; Umgebungsvariablen (werden aus docker-compose.yml übernommen)
env[BMV_ADMIN_KEY] = $BMV_ADMIN_KEY
env[MAIL_HOST]     = $MAIL_HOST
env[MAIL_PORT]     = $MAIL_PORT

; Fehlerlog
php_admin_flag[log_errors]   = on
php_admin_value[error_log]   = /proc/self/fd/2
