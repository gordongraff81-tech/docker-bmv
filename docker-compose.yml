# ═══════════════════════════════════════════════════════════════
# BMV Menüdienst – Lokale Entwicklungsumgebung
#
# Startet:
#   http://localhost:8080        → Hauptwebsite (www.bmv-kantinen.de)
#   http://localhost:8081        → Speiseplan (speiseplan.bmv-kantinen.de)
#   http://localhost:8082        → Kantine-Speiseplan (kantinen-speiseplan.bmv-kantinen.de)
#   http://localhost:8083        → Admin-Panel (/admin/)
#   http://localhost:8025        → Mailhog (E-Mail-Vorschau)
#
# Starten:  docker compose up
# Stoppen:  docker compose down
# Logs:     docker compose logs -f php
# ═══════════════════════════════════════════════════════════════
services:
  # ── PHP-FPM ───────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: bmv_php
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./www:/var/www/html:rw
      - ./data:/var/www/html/data:rw
    environment:
      BMV_ADMIN_KEY: "${BMV_ADMIN_KEY:-bmv-admin-2025}"
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      PEXELS_API_KEY: "${PEXELS_API_KEY}"
    depends_on:
      - mailhog
    networks:
      - bmv
  nginx-main:
    image: nginx:alpine
    container_name: bmv_nginx_main
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html:ro
      - ./nginx/main.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - bmv
  # ── Nginx: Speiseplan (:8081) ──────────────────────────────
  nginx-bestellen:
    image: nginx:alpine
    container_name: bmv_nginx_bestellen
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./www:/var/www/html:ro
      - ./nginx/bestellen.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - bmv
  # ── Nginx: Kantine-Speiseplan (:8082) ──────────────────────
  nginx-kantine:
    image: nginx:alpine
    container_name: bmv_nginx_kantine
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./www:/var/www/html:ro
      - ./nginx/kantine.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - bmv
  # ── Nginx: Admin-Panel (:8083) ─────────────────────────────
  nginx-admin:
    image: nginx:alpine
    container_name: bmv_nginx_admin
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./www:/var/www/html:ro
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - bmv
  # ── Mailhog: E-Mail-Vorschau (:8025) ───────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bmv_mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web-UI
      - "1025:1025"   # SMTP
    networks:
      - bmv
networks:
  bmv:
    driver: bridge
