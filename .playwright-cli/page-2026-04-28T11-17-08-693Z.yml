    - region "Alles zum Thema Essen auf Rädern" [ref=e115]:
      - generic [ref=e116]:
        - generic [ref=e117]:
          - generic [ref=e118]: Häufige Fragen
          - heading "Alles zum Thema Essen auf Rädern" [level=2] [ref=e119]
        - list [ref=e120]:
          - listitem [ref=e121]:
            - button "Wie wird das Essen angeliefert?" [ref=e122]
            - region [ref=e123]:
              - paragraph [ref=e124]: Das Essen kommt in isolierten Behältern, um die Wärme zu bewahren. Es wird täglich zwischen 11:00 und 13:00 Uhr angeliefert. Sie müssen nicht anwesend sein – der Fahrer kann die Mahlzeit auch in einer Transportbox vor der Tür deponieren.
          - listitem [ref=e125]:
            - button "Kann die Pflegekasse zahlen?" [ref=e126]
            - region [ref=e127]:
              - paragraph [ref=e128]: Ja. Essen auf Rädern kann unter dem Pflegebedarf „Entlastung von Pflegepersonen" über die Pflegekasse abgerechnet werden. Wir helfen Ihnen gerne bei der Antragstellung und begleiten den Prozess.
          - listitem [ref=e129]:
            - button "Wie lange bin ich gebunden?" [ref=e130]
            - region [ref=e131]:
              - paragraph [ref=e132]: Gar nicht. Es gibt keine Mindestlaufzeit. Sie können Ihre Bestellung jederzeit beenden oder anpassen. Auch einzelne Tage können Sie überspringen – völlige Flexibilität.
          - listitem [ref=e133]:
            - button "Was passiert bei Allergien oder Unverträglichkeiten?" [ref=e134]
            - region [ref=e135]:
              - paragraph [ref=e136]: Wir nehmen Allergien und Unverträglichkeiten ernst. Bei der Bestellung geben Sie alle Einschränkungen an, und unsere Küche berücksichtigt diese. Alle Menüs sind entsprechend gekennzeichnet.
          - listitem [ref=e137]:
            - button "Kann ich einen Tag aussetzen?" [ref=e138]
            - region [ref=e139]:
              - paragraph [ref=e140]: Selbstverständlich. Sie können beliebig viele Tage auswählen oder aussparen – zum Beispiel wenn Sie im Urlaub sind oder Besuch haben, der für Sie kocht.
