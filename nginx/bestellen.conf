# ── Bestellseite: localhost:8081 → bestellen.bmv-kantinen.de ──
server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php;
    charset utf-8;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Subdomain-Startseite zeigt auf subdomain-bestellen/index.php
    location = / {
        fastcgi_pass   bmv_php:9000;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/subdomain-bestellen/index.php;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html;
        include        fastcgi_params;
        fastcgi_param  BMV_ADMIN_KEY "bmv-admin-2025";
    }

    # PHP
    location ~ \.php$ {
        fastcgi_pass   bmv_php:9000;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html;
        include        fastcgi_params;
        fastcgi_param  BMV_ADMIN_KEY "bmv-admin-2025";
    }

    # Assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1d;
    }

    location /data/ { deny all; }
    location ~/\.   { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
