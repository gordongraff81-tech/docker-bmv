# ── Admin-Panel: localhost:8083 ────────────────────────────────
server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php;
    charset utf-8;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Startseite → Admin direkt (kein Redirect, direkt PHP ausführen)
    location = / {
        fastcgi_pass   bmv_php:9000;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/admin/index.php;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html;
        include        fastcgi_params;
        fastcgi_param  BMV_ADMIN_KEY   "bmv-admin-2025";
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   bmv_php:9000;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $document_root;
        include        fastcgi_params;
        fastcgi_param  BMV_ADMIN_KEY   "bmv-admin-2025";
    }

    location /api/ {
        try_files $uri $uri/ /api/$1/index.php?$query_string;
    }

    location /pdf/ {
        try_files $uri $uri/ /pdf/index.php?$query_string;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    location /data/ { deny all; return 403; }
    location ~ /\.  { deny all; }

    location / {
        try_files $uri $uri/ =404;
    }
}