# ── Hauptwebsite: localhost:8080 → www.bmv-kantinen.de ────────
server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php;
    charset utf-8;

    # Security
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Logs
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Static assets – serve directly with cache header
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Block data directory
    location /data/ {
        deny all;
        return 403;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    # PHP handler – must be defined before the catch-all location
    location ~ \.php$ {
        fastcgi_pass   bmv_php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $document_root;
        include        fastcgi_params;
    }

    # Catch-all: try the URI as a file, then as a directory (which triggers
    # index.php resolution via the `index` directive above), then fall back
    # to the root index.php so slug-based pages can be handled in PHP.
    #
    # This correctly resolves:
    #   /                         → /index.php
    #   /essen-auf-raedern/       → /essen-auf-raedern/index.php
    #   /catering/potsdam/        → /catering/potsdam/index.php
    #   /catering/werder-havel/   → /catering/werder-havel/index.php
    #   /essen-auf-raedern/umland/ → /essen-auf-raedern/umland/index.php
    #   /werder-havel             → redirect to /essen-auf-raedern/werder-havel/
    #                               (via PHP slug routing in index.php, see below)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
