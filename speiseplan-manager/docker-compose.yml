services:
  # ════════════════════ PostgreSQL ════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: speiseplan_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-speiseplan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-speiseplan_secure}
      POSTGRES_DB: ${DB_NAME:-speiseplan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speiseplan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - speiseplan_net

  # ════════════════════ Flask Backend ════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: speiseplan_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-speiseplan}:${DB_PASSWORD:-speiseplan_secure}@postgres:5432/${DB_NAME:-speiseplan}
      FLASK_ENV: production
    volumes:
      - ./backend:/app
      - backend_data:/data
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - speiseplan_net
    command: sh -c "python init_data.py && gunicorn --bind 0.0.0.0:5000 app:app"

  # ════════════════════ React Frontend ════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: speiseplan_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - speiseplan_net

  # ════════════════════ Nginx Reverse Proxy ════════════════════
  nginx:
    image: nginx:alpine
    container_name: speiseplan_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - speiseplan_net

networks:
  speiseplan_net:
    driver: bridge

volumes:
  postgres_data:
  backend_data:
